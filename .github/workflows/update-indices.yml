name: Update Nifty Indices and ETF Data

on:
  schedule:
    # 11:00 UTC = 4:30 PM IST, after NSE market close, weekdays only
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest Nifty indices
        run: python scripts/fetch_indices.py

      - name: Fetch latest ETF data
        run: python scripts/fetch_etf.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/etf.json
          git diff --quiet --cached || git commit -m "Update Nifty indices + ETF data ($(date -u +'%Y-%m-%d'))"
          git push

